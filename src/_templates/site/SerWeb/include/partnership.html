<form method="post"  class="contact-form input-smoke ajax-contact">
    {% csrf_token %}
    <div class="row">
        {{ form.type }}
        <div class="form-group col-md-6">
            {{ form.email }}
        </div>
        <div class="form-group col-md-6">
            {{ form.phone }}
        </div>
        <div class="form-group col-md-12">
            {{ form.content }}
        </div>
        <div class="form-group col-md-12">
            <button type="submit" class="th-btn btn-fw">
                    {% trans "Отправить" %}<i class="fas fa-chevrons-right ms-2"></i></button>
        </div>
    </div>
</form>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const typeInput = document.getElementById("id_type");
        if (typeInput) {
            typeInput.value = "3";
        }
    });
</script>
