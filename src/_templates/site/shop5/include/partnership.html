<form method="post" >
    {% csrf_token %}
    <div class="row">
        {{ form.type }}
        <div class="single-form col-md-6">
            {{ form.email }}
        </div>
        <div class="single-form col-md-6">
            {{ form.phone }}
        </div>
        <div class="single-form col-md-12">
            {{ form.content }}
        </div>
        <div class="single-form col-md-12">
            <button type="submit" class="btn btn-primary">Отправить</button>
        </div>
    </div>
</form>
