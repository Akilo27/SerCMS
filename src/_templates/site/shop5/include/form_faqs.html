<!-- Форма -->
<div class="panel">
    {% if user.is_authenticated %}
    <div class="panel-body" id="faqs-form" data-product="{{product.id}}">
        <textarea class="form-control" rows="2" placeholder="У вас есть вопросы?"></textarea>
        <div class="mar-top clearfix" style="padding-top: 10px">
            <button class="btn btn-sm btn-primary pull-right" onclick="submitQuestion()" type="submit">Написать</button>
        </div>
    </div>
    {% else %}
    Задать вопрос могут только авторизованные пользователи
    {% endif %}
</div>
