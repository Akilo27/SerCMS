{% if user.is_authenticated %}
<div class="meta-action" id="bookmark_button_{{ product.id }}" data-product="{{ product.id }}" style=" margin-top: -40px; z-index: 1000; border-radius:50%; position: absolute; right: 0;">
    {% if product in is_bookmarked %}

        <button class=" bookmark btn-product-icon btn-wishlist" type="button" style="" data-type="bookmarkDelete" data-product="{{ product.id }}" >
           <i class="w-icon-heart-full"></i>
        </button>
    {% else %}
        <button class=" bookmark btn-product-icon btn-wishlist w-icon-heart" style="cursor: pointer;border-radius: 50%;" type="button" data-type="bookmarkAdd" data-product="{{ product.id }}" >
        </button>
    {% endif %}
</div>
{% endif %}
