{% load i18n %}

<div class="login-form-side wd-side-hidden woocommerce wd-right">
    <div class="wd-heading">
        <span class="title">Sign in</span>
        <div class="close-side-widget wd-action-btn wd-style-text wd-cross-icon">
            <a href="{% url 'webmain:home' %}" rel="nofollow">Close</a>
        </div>
    </div>

    <div class="woocommerce-notices-wrapper"></div>
    <form method="post"
          class="login woocommerce-form woocommerce-form-login hidden-form"
          action="https://woodmart.xtemos.com/furniture2/my-account/"
          style="display:none;">
        <p class="woocommerce-FormRow woocommerce-FormRow--wide form-row form-row-wide form-row-username">
            <label for="username">
                Username or email address&nbsp;
                <span class="required" aria-hidden="true">*</span>
                <span class="screen-reader-text">Required</span>
            </label>
            <input type="text"
                   class="woocommerce-Input woocommerce-Input--text input-text"
                   name="username"
                   id="username"
                   value=""/>
        </p>
        <p class="woocommerce-FormRow woocommerce-FormRow--wide form-row form-row-wide form-row-password">
            <label for="password">
                Password&nbsp;
                <span class="required" aria-hidden="true">*</span>
                <span class="screen-reader-text">Required</span>
            </label>
            <input class="woocommerce-Input woocommerce-Input--text input-text"
                   type="password"
                   name="password"
                   id="password"
                   autocomplete="current-password"/>
        </p>
        <p class="form-row">
            <input type="hidden"
                   id="woocommerce-login-nonce"
                   name="woocommerce-login-nonce"
                   value="9ce58b5e15"/>
            <input type="hidden"
                   name="_wp_http_referer"
                   value="/furniture2/"/>
            <input type="hidden"
                   name="redirect"
                   value="https://woodmart.xtemos.com/furniture2/"/>
            <button type="submit" class="button woocommerce-button woocommerce-form-login__submit" name="login"
                    value="Log in">Log in
            </button>
        </p>

        <p class="login-form-footer">
            <a href="https://woodmart.xtemos.com/furniture2/my-account/lost-password/"
               class="woocommerce-LostPassword lost_password">
                Lost your password?
            </a>
            <label class="woocommerce-form__label woocommerce-form__label-for-checkbox woocommerce-form-login__rememberme">
                <input class="woocommerce-form__input woocommerce-form__input-checkbox" name="rememberme"
                       type="checkbox" value="forever" title="Remember me" aria-label="Remember me"/>
                <span>Remember me</span>
            </label>
        </p>


    </form>


    <div class="create-account-question">
        <p>{% trans 'Аккаунта пока нет?' %}</p>
        <a href="https://woodmart.xtemos.com/furniture2/my-account/?action=register" class="btn create-account-button">
            {% trans 'Создать учетную запись' %}
        </a>
    </div>
</div>
