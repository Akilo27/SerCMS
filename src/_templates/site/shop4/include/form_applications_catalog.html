<div id="no_order_{{product.id}}" data-product="{{product.id}}">
    {% if product in application_exists %}
    <button class="btn btn-danger btn-sm" type="button" id="button_order_no">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-exclamation" viewBox="0 0 16 16">
            <path d="M2 2a2 2 0 0 0-2 2v8.01A2 2 0 0 0 2 14h5.5a.5.5 0 0 0 0-1H2a1 1 0 0 1-.966-.741l5.64-3.471L8 9.583l7-4.2V8.5a.5.5 0 0 0 1 0V4a2 2 0 0 0-2-2zm3.708 6.208L1 11.105V5.383zM1 4.217V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v.217l-7 4.2z"/>
            <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1.5a.5.5 0 0 1-1 0V11a.5.5 0 0 1 1 0m0 3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
        </svg>
    </button>
    {% else %}
    <button class="btn btn-danger btn-sm" type="button" data-product="{{product.id}}" data-bs-target="#exampleApplications{{product.id}}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-exclamation" viewBox="0 0 16 16">
            <path d="M2 2a2 2 0 0 0-2 2v8.01A2 2 0 0 0 2 14h5.5a.5.5 0 0 0 0-1H2a1 1 0 0 1-.966-.741l5.64-3.471L8 9.583l7-4.2V8.5a.5.5 0 0 0 1 0V4a2 2 0 0 0-2-2zm3.708 6.208L1 11.105V5.383zM1 4.217V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v.217l-7 4.2z"/>
            <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1.5a.5.5 0 0 1-1 0V11a.5.5 0 0 1 1 0m0 3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
        </svg>
    </button>
    <div class="modal fade" id="exampleApplications{{product.id}}" tabindex="-1" aria-labelledby="exampleApplications{{product.id}}" style="display: none; z-index: 999" aria-hidden="false">
        <div class="modal-dialog modal-dialog-centered" >
            <div class="modal-content" data-product="{{product.id}}">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalCenterTitle">{{product.name}}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" data-applications="True" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="form-floating" id="application-form" data-product="{{product.id}}">
                        <input type="hidden" id="csrf_token" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
                        <input type="hidden" id="product_id" name="product_id" value="{{ product.id }}">

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                            <label for="floatingInput">{% trans 'Электронная почта' %}</label>
                        </div>
                        <div class="form-floating">
                            <input type="text" class="form-control" id="phone" placeholder="{% trans 'Телефон' %}">
                            <label for="phone">{% trans 'Телефон' %}</label>
                        </div>
                        <br>
                        <div class="form-floating">
                            <textarea class="form-control" placeholder="{% trans 'Комментарий' %}" id="floatingTextarea"></textarea>
                            <label for="floatingTextarea">{% trans 'Комментарий' %}</label>
                        </div>
                        <div id="application-message" style="display: none;"></div>  <!-- Элемент для сообщений -->
                        <div class="modal-footer">
                            <button type="button" onclick="submitForm(this)" data-product="{{product.id}}" class="btn-send">{% trans 'Отправить' %}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endif %}
</div>
<style>
    .btn-close {
        box-sizing: content-box!important;
        width: 1em!important;
        height: 1em!important;
        color: #000!important;
        border: 0!important;
        border-radius: .375rem!important;
        opacity: .5!important;
    }
</style>
