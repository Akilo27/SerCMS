<a class="btn-product-icon  w-icon-compare add-to-compare"  data-id="{{ product.id }}" title="Compare"></a>
<script>
document.addEventListener("click", async (e) => {
  const btn = e.target.closest(".add-to-compare");
  if (!btn) return;
  const id = btn.dataset.id;

  // создать индикатор
  const spinner = document.createElement("div");
  spinner.className = "compare-spinner";
  btn.appendChild(spinner);

  try {
    const resp = await fetch(
      "{% url 'shop:compare_add' '00000000-0000-0000-0000-000000000000' %}"
        .replace('00000000-0000-0000-0000-000000000000', id),
      {
        method: "POST",
        headers: { "X-CSRFToken": "{{ csrf_token }}",
                   "X-Requested-With": "XMLHttpRequest" }
      }
    );
    const data = await resp.json();
    if (data.ok) {
      console.log("Добавлено в сравнение. Кол-во:", data.count);
    } else {
      alert(data.message);
    }
  } catch(err) {
    console.error(err);
  } finally {
    // убрать индикатор через 2 сек
    setTimeout(() => spinner.remove(), 2000);
  }
});
</script>

<style>
.compare-spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 22px;
  height: 22px;
  margin: -11px 0 0 -11px;
  border: 2px solid rgba(255,255,255,0.6);
  border-top-color: #1e5ea4; /* основной цвет */
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  z-index: 10;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.btn-product-icon {
  position: relative; /* чтобы спиннер позиционировался внутри */
}
</style>
