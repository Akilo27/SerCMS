<section class="category-section top-category bg-grey pt-10 pb-10 appear-animate">
    <div class="container pb-2">
        <h2 class="title justify-content-center pt-1 ls-normal mb-5">{% trans 'Лучшие продавцы' %}</h2>
        <div class="swiper">
            <div class="swiper-container swiper-theme pg-show" data-swiper-options="{
                            'spaceBetween': 20,
                            'slidesPerView': 2,
                            'breakpoints': {
                                '576': {
                                    'slidesPerView': 3
                                },
                                '768': {
                                    'slidesPerView': 5
                                },
                                '992': {
                                    'slidesPerView': 6
                                }
                            }
                        }">

                <div class="swiper-wrapper row cols-lg-6 cols-md-5 cols-sm-3 cols-2">
                    {% for manufacturer in manufacturers %}
                    <div class="swiper-slide category category-classic category-absolute overlay-zoom br-xs" class="thumb" data_manufacturer="{{ manufacturer.id }}">
                        <a href="{% url 'shop:manufacturers' manufacturer.slug %}" class="category-media">
                            <img src="{% if manufacturer.image %}{{ manufacturer.image.url }}{% endif %}" alt="Category"
                                 style="width: 100%;
    object-fit: scale-down;
    height: 200px;" width="130" height="130">
                        </a>
                        <div class="category-content">
                            <h4 class="category-name"><a href="{% url 'shop:manufacturers' manufacturer.slug %}"></a></h4>
                            <a href="{% url 'shop:catalogs' %}"
                               class="btn btn-primary btn-link btn-underline">{{ manufacturer.name }}</a>
                        </div>
                    </div>
                    {% endfor %}
                </div>

            </div>
        </div>
    </div>
</section>
