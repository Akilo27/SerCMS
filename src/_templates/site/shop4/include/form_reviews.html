
{% load static generals_tag i18n%}

{% if user.is_authenticated %}
{% if show_reviews_form %}
<form id="review-form"
      method="post"
      enctype="multipart/form-data"
      action="{% url 'submit_review' %}"
      data-submit-url="{% url 'submit_review' %}">
  {% csrf_token %}
  <input type="hidden" name="product" value="{{ product.id }}">
  {{ reviews_form.author }}
  <input type="hidden" name="author" value="{{ user.id }}">

  <div class="form-group">
    <label>{% trans 'Оценка' %}</label>
    <div class="rating-form">
      <span class="rating-stars">
        <a class="star-1" href="#" data-value="1">1</a>
        <a class="star-2" href="#" data-value="2">2</a>
        <a class="star-3" href="#" data-value="3">3</a>
        <a class="star-4" href="#" data-value="4">4</a>
        <a class="star-5" href="#" data-value="5">5</a>
      </span>

      <!-- скрываемые radio — для совместимости -->
      <input type="radio" id="star5" name="rate" value="5" />
      <input type="radio" id="star4" name="rate" value="4" />
      <input type="radio" id="star3" name="rate" value="3" />
      <input type="radio" id="star2" name="rate" value="2" />
      <input type="radio" id="star1" name="rate" value="1" />
    </div>
  </div>

  <div class="form-group">
    <label>{% trans 'Отзыв' %}</label>
    <textarea name="text" class="form-control" placeholder="{% trans 'Ваш отзыв' %}"></textarea>
  </div>

  <input type="hidden" name="starvalue" id="reiting">

  <div class="form-group">
    <label for="review-images">{% trans 'Изображения (до 5 шт.)' %}</label>
    <input id="review-images" type="file" name="images" accept="image/*" multiple>
    <small class="text-muted">{% trans 'PNG/JPG/WebP до 5 МБ каждое' %}</small>
  </div>

  <div id="preview" class="review-previews"></div>

  <button type="submit" class="btn btn-sm btn-primary pull-right">{% trans 'Оставить отзыв' %}</button>
</form>
{% endif %}
{% endif %}
<script>
  // Для наглядности: выведем, что реально подставилось
  console.log('form.action =', document.getElementById('review-form')?.action);
  console.log('data-submit-url =', document.getElementById('review-form')?.dataset.submitUrl);
</script>

<script>
(function () {
  // звёзды → radio + hidden + подсветка
  document.addEventListener('click', function (e) {
    const a = e.target.closest('.rating-stars a');
    if (!a) return;
    e.preventDefault();
    const value = a.dataset.value;
    const form = a.closest('form') || document;
    form.querySelectorAll('input[name="rate"]').forEach(r => r.checked = (r.value === value));
    const hidden = form.querySelector('#reiting');
    if (hidden) hidden.value = value;
    form.querySelectorAll('.rating-stars a').forEach(s => {
      s.classList.toggle('active', Number(s.dataset.value) <= Number(value));
    });
  });

  // предпросмотр
  document.getElementById('review-images')?.addEventListener('change', function(){
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    const files = this.files || [];
    files && Array.from(files).forEach(f => {
      if (!/^image\//.test(f.type)) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.src = e.target.result;
        img.style.cssText = "width:90px;height:90px;object-fit:cover;margin:4px;border:1px solid #eee;border-radius:6px;";
        preview.appendChild(img);
      };
      reader.readAsDataURL(f);
    });
  });

  // submit (FormData), с защитой от повторных кликов
  let submitting = false;
  document.getElementById('review-form')?.addEventListener('submit', function(e){
    e.preventDefault();
    if (submitting) return;
    submitting = true;

    const form = this;
    const url  = form.action;
    const fd   = new FormData(form);

    const rating = form.querySelector('input[name="rate"]:checked')?.value;
    if (!rating) { alert('Выберите оценку'); submitting = false; return; }
    fd.set('starvalue', rating);

    const filesInput = document.getElementById('review-images');
    if (filesInput) {
      fd.delete('images');
      for (const f of filesInput.files) fd.append('images', f);
    }

    fetch(url, {
      method: 'POST',
      headers: { 'X-CSRFToken': form.querySelector('input[name=csrfmiddlewaretoken]').value },
      body: fd
    }).then(async (r) => {
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.status !== 'success') {
        console.error('Ошибка:', data.errors || data);
        alert('Ошибка отправки отзыва');
        submitting = false;
        return;
      }
      // успех
      form.reset();
      document.getElementById('preview').innerHTML = '';
      document.querySelectorAll('.rating-stars a').forEach(a => a.classList.remove('active'));
      submitting = false;

      // при необходимости перерисовать список отзывов
      const list = document.getElementById('reviews-list');
      if (list) {
        fetch(location.href).then(r => r.text()).then(html => {
          const tmp = document.createElement('div'); tmp.innerHTML = html;
          const fresh = tmp.querySelector('#reviews-list');
          if (fresh) list.innerHTML = fresh.innerHTML;
        });
      }
    }).catch(err => {
      console.error('Network error:', err);
      submitting = false;
      alert('Сеть недоступна');
    });
  });
})();
</script>

<script>
document.addEventListener('click', function (e) {
  const a = e.target.closest('.rating-stars a');
  if (!a) return;

  e.preventDefault();
  const value = a.dataset.value;

  // находим форму, в которой кликнули
  const form = a.closest('form') || document;
  const hidden = form.querySelector('#reiting');
  const radios = form.querySelectorAll('input[name="rate"]');
  const stars  = form.querySelectorAll('.rating-stars a');

  // проставляем radio и hidden
  radios.forEach(r => r.checked = (r.value === value));
  if (hidden) hidden.value = value;

  // визуально подсветить звёзды
  stars.forEach(s => {
    s.classList.toggle('active', Number(s.dataset.value) <= Number(value));
  });
});

// если radio меняется (например, руками из DevTools) — синхронизируем hidden
document.addEventListener('change', function (e) {
  if (e.target.matches('input[name="rate"]')) {
    const form = e.target.closest('form') || document;
    const hidden = form.querySelector('#reiting');
    if (hidden) hidden.value = e.target.value;

    const stars = form.querySelectorAll('.rating-stars a');
    stars.forEach(s => {
      s.classList.toggle('active', Number(s.dataset.value) <= Number(e.target.value));
    });
  }
});
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
      const stars = document.querySelectorAll(".rating-stars a");
      const inputs = document.querySelectorAll("input[name='rate']");

      stars.forEach(star => {
        star.addEventListener("click", function(e) {
          e.preventDefault(); // Останавливаем переход по ссылке
          const value = this.getAttribute("data-value"); // Получаем значение звезды
          // Находим соответствующий input и ставим его checked
          inputs.forEach(input => {
            if (input.value === value) {
              input.checked = true;
            }
          });
          // Обновляем визуальное состояние звезды
          updateStars(value);
        });
      });

      // Функция для обновления визуального состояния звезды
      function updateStars(value) {
        stars.forEach(star => {
          const starValue = star.getAttribute("data-value");
          if (parseInt(starValue) <= value) {
            star.classList.add("active");
          } else {
            star.classList.remove("active");
          }
        });
      }

      // Инициализация, чтобы отобразить активные звезды на основе уже выбранного значения
      const checkedInput = document.querySelector("input[name='rate']:checked");
      if (checkedInput) {
        updateStars(checkedInput.value);
      }
    });
</script>
<style>
    .rating-form input , .rating-form label {
        display:none;
    }
</style>
