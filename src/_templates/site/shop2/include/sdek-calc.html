<div class="container">
    <div class="sdek-calculator">


        <div id="calculatorTab">
            <div class="sdek-card" style="display:none;">
                <h2 class="sdek-card-title">Информация о заказе</h2>
                <div class="sdek-cart-info">
                    <h3>Данные из корзины:</h3>
                    <div id="sdek-cartData">
                        <div class="sdek-spinner"></div>
                        <p>Загрузка данных корзины...</p>
                    </div>
                </div>
            </div>

            <div class="sdek-card">
                <div class="sdek-delivery-form">
                    <div class="sdek-form-group" style="display:none;">
                        <label class="sdek-label" for="sdek-cityFrom">Город отправления:</label>
                        <input class="sdek-input" type="text" id="sdek-cityFrom" placeholder="Например: Москва">
                    </div>

                    <div class="sdek-form-group" style="display:none;">
                        <label class="sdek-label" for="sdek-pvzFrom">Пункт отправления:</label>
                        <select class="sdek-select" id="sdek-pvzFrom">
                            <option value="">Сначала выберите город</option>
                        </select>
                    </div>

                    <div class="sdek-form-group">
                        <label class="sdek-label" for="sdek-cityTo">Город назначения:</label>
                        <input class="sdek-input" type="text" id="sdek-cityTo" placeholder="Например: Самара">
                    </div>

                    <div class="sdek-form-group">
                        <label class="sdek-label" for="sdek-pvzTo">Пункт назначения:</label>
                        <select class="sdek-select" id="sdek-pvzTo">
                            <option value="">Сначала выберите город</option>
                        </select>
                    </div>

                    <div class="sdek-form-group">
                        <label class="sdek-label" for="sdek-tariff">Тариф:</label>
                        <select class="sdek-select" id="sdek-tariff">
                            <option value="136">Посылка склад-склад</option>
                            <option value="137">Посылка склад-дверь</option>
                            <option value="138">Посылка дверь-склад</option>
                            <option value="139">Посылка дверь-дверь</option>
                            <option value="233">Экспресс-лайт склад-склад</option>
                            <option value="234">Экспресс-лайт склад-дверь</option>
                            <option value="231">Экспресс-лайт дверь-склад</option>
                            <option value="232">Экспресс-лайт дверь-дверь</option>
                        </select>
                    </div>

                    <span class="sdek-btn-span" id="sdek-calculate-btn">
                            <i class="fas fa-calculator"></i> Рассчитать стоимость
                        </span>
                </div>
            </div>

            <div class="sdek-card">
                <h2 class="sdek-card-title">Результаты расчета</h2>
                <div id="sdek-loader" class="sdek-loader sdek-hidden">
                    <div class="sdek-spinner"></div>
                    <p>Идет расчет стоимости...</p>
                </div>
                <div id="sdek-results">
                    <p>Здесь будет отображена информация о стоимости доставки</p>
                </div>
            </div>
        </div>

        <div id="requestsTab" class="sdek-hidden">
            <div class="sdek-card">
                <h2 class="sdek-card-title">Мои заявки на доставку</h2>
                <div class="requests-list" id="requestsList">
                    <div class="empty-requests">
                        <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px;"></i>
                        <p>У вас пока нет сохраненных заявок</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Изолируем весь код в самовызывающейся функции
    (function() {
        'use strict';

        // Конфигурация
        const CLIENT_ID = 'qpxu3eqAqR2r6HD9pn7dv9ATyKGxJIZk';
        const CLIENT_SECRET = 'SHkc1B7RQ5YmiuUyZkDyICO5eabM6e2t';
        const CORS_PROXY = 'https://corsproxy.io/?';
        let authToken = null;
        let cartData = null;
        let isCalculating = false;

        // Значения по умолчанию
        const DEFAULT_CITY = 'Москва';
        const DEFAULT_PVZ = {
            code: 'MSK1765',
            name: 'MSK1765, Москва, ул.Паромная',
            address: 'ул.Паромная'
        };

        // Базовые тарифы СДЭК (руб)
        const TARIFFS = {
            136: { base: 500, per_kg: 35, per_km: 0.8, min: 600 },
            137: { base: 600, per_kg: 40, per_km: 0.9, min: 700 },
            138: { base: 650, per_kg: 45, per_km: 1.0, min: 750 },
            139: { base: 700, per_kg: 50, per_km: 1.1, min: 800 },
            233: { base: 400, per_kg: 30, per_km: 0.7, min: 500 },
            234: { base: 450, per_kg: 35, per_km: 0.8, min: 550 },
            231: { base: 500, per_kg: 40, per_km: 0.9, min: 600 },
            232: { base: 550, per_kg: 45, per_km: 1.0, min: 650 }
        };

        // Примерные расстояния между городами (км)
        const CITY_DISTANCES = {
            'москва': {
                'санкт-петербург': 700, 'новосибирск': 3300, 'екатеринбург': 1800,
                'казань': 800, 'нижний новгород': 400, 'самара': 1100, 'омск': 2800,
                'челябинск': 2000, 'ростов-на-дону': 1200, 'уфа': 1200, 'красноярск': 4200,
                'пермь': 1500, 'воронеж': 500, 'волгоград': 1000
            },
            'санкт-петербург': {
                'москва': 700, 'новосибирск': 3900, 'екатеринбург': 2500,
                'казань': 1500, 'нижний новгород': 1100
            }
        };

        // Функция для безопасного получения элемента
        function getSdekElement(id) {
            return document.getElementById('sdek-' + id);
        }

        // Функция для переключения вкладок
        function showTab(tabName) {
            document.getElementById('calculatorTab').classList.toggle('sdek-hidden', tabName !== 'calculator');
            document.getElementById('requestsTab').classList.toggle('sdek-hidden', tabName !== 'requests');

            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            if (tabName === 'requests') {
                loadRequests();
            }
        }

        // Функция для получения примерного расстояния
        function getDistance(fromCity, toCity) {
            const from = fromCity.toLowerCase();
            const to = toCity.toLowerCase();

            if (CITY_DISTANCES[from] && CITY_DISTANCES[from][to]) {
                return CITY_DISTANCES[from][to];
            }
            if (CITY_DISTANCES[to] && CITY_DISTANCES[to][from]) {
                return CITY_DISTANCES[to][from];
            }
            return 1500;
        }

        // Функция для расчета примерной стоимости
        function calculateApproximatePrice(tariffCode, weight, distance) {
            const tariff = TARIFFS[tariffCode] || TARIFFS[136];

            let calculatedPrice = tariff.base + (weight * tariff.per_kg) + (distance * tariff.per_km);

            if (distance > 1000) calculatedPrice *= 1.2;
            if (distance > 2000) calculatedPrice *= 1.3;

            return Math.max(tariff.min, Math.round(calculatedPrice / 50) * 50);
        }

        // Функция для сохранения заявки
        function saveRequest(requestData) {
            let requests = JSON.parse(localStorage.getItem('sdek_requests') || '[]');
            requests.unshift({
                ...requestData,
                id: Date.now(),
                date: new Date().toLocaleString()
            });

            // Сохраняем только последние 10 заявок
            if (requests.length > 10) {
                requests = requests.slice(0, 10);
            }

            localStorage.setItem('sdek_requests', JSON.stringify(requests));
            return requests[0]; // Возвращаем сохраненную заявку
        }

        // Функция для загрузки заявок
        function loadRequests() {
            const requests = JSON.parse(localStorage.getItem('sdek_requests') || '[]');
            const requestsList = document.getElementById('requestsList');

            if (requests.length === 0) {
                requestsList.innerHTML = `
                    <div class="empty-requests">
                        <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px;"></i>
                        <p>У вас пока нет сохраненных заявок</p>
                    </div>
                `;
                return;
            }

            requestsList.innerHTML = requests.map(request => `
                <div class="request-item">
                    <div class="request-header">
                        <strong>${request.fromCity} → ${request.toCity}</strong>
                        <span class="request-price">${request.price} ₽</span>
                    </div>
                    <div class="request-details">
                        <p>Тариф: ${getTariffName(request.tariff)}</p>
                        <p>Вес: ${request.weight} кг</p>
                        <p>Дата: ${request.date}</p>
                        <p>Статус: ${request.isReal ? 'Точный расчет' : 'Примерный расчет'}</p>
                    </div>
                </div>
            `).join('');
        }

        // Функция для извлечения данных из корзины
        function getCartData() {
            const cartElement = document.getElementById('cart-information');
            if (!cartElement) return getFallbackCartData();

            try {
                const address = cartElement.getAttribute('data-sdek');
                const cartIdJson = cartElement.getAttribute('data-cart-id');

                if (!cartIdJson) return getFallbackCartData();

                const fixedJson = cartIdJson.replace(/&quot;/g, '"');
                const items = JSON.parse(fixedJson);

                return {
                    address: address || "Москва ул. Промышленная, 11 стр. 3, пом. 1, 5",
                    items: Array.isArray(items) ? items : [items]
                };
            } catch (error) {
                console.error('Ошибка парсинга данных корзины:', error);
                return getFallbackCartData();
            }
        }

        function getFallbackCartData() {
            return {
                address: "Москва ул. Промышленная, 11 стр. 3, пом. 1, 5",
                items: [{
                    product_id: "test-id",
                    product_name: "Тестовый товар",
                    quantity: 1,
                    weight: 1,
                    length: 10,
                    width: 10,
                    height: 10
                }]
            };
        }

        // Функция для отображения данных корзины
        function displayCartData() {
            const cartDataElement = getSdekElement('cartData');
            cartData = getCartData();

            if (!cartData || !cartData.items || cartData.items.length === 0) {
                cartDataElement.innerHTML = `
                    <div class="sdek-empty-cart">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Данные корзины не найдены</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let totalWeight = 0;

            cartData.items.forEach((item) => {
                totalWeight += item.weight * item.quantity;
                html += `
                    <div class="sdek-cart-item">
                        <div><strong>${item.product_name}</strong></div>
                        <div>${item.quantity} шт. × ${item.weight} кг</div>
                    </div>
                `;
            });

            html += `
                <div class="sdek-cart-item">
                    <div><strong>Общий вес:</strong></div>
                    <div><strong>${totalWeight} кг</strong></div>
                </div>
                <div class="sdek-cart-item">
                    <div><strong>Пункт отправления:</strong></div>
                    <div><strong>${cartData.address}</strong></div>
                </div>
            `;

            cartDataElement.innerHTML = html;
        }

        // Функция для получения OAuth токена
        async function getAuthToken() {
            try {
                const response = await fetch(CORS_PROXY + 'https://api.cdek.ru/v2/oauth/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'grant_type': 'client_credentials',
                        'client_id': CLIENT_ID,
                        'client_secret': CLIENT_SECRET
                    })
                });

                if (!response.ok) throw new Error(`Ошибка авторизации: ${response.status}`);

                const data = await response.json();
                authToken = data.access_token;
                return authToken;
            } catch (error) {
                console.error('Ошибка получения токена:', error);
                throw error;
            }
        }

        // Функция для поиска ПВЗ по городу
        async function searchPVZ(cityName, isFrom = false) {
            try {
                if (!authToken) await getAuthToken();

                const cleanCityName = cityName.replace(/ул\.|улица|д\.|дом|стр\.|строение|пом\.|помещение/g, '').trim();

                const cityResponse = await fetch(CORS_PROXY + `https://api.cdek.ru/v2/location/cities?city=${encodeURIComponent(cleanCityName)}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!cityResponse.ok) throw new Error('Город не найден');

                const cities = await cityResponse.json();
                if (cities.length === 0) throw new Error('Город не найден');

                const cityCode = cities[0].code;

                const pvzResponse = await fetch(CORS_PROXY + `https://api.cdek.ru/v2/deliverypoints?city_code=${cityCode}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!pvzResponse.ok) throw new Error('Не удалось загрузить ПВЗ');

                const pvzData = await pvzResponse.json();

                updatePVZSelect(pvzData, isFrom ? 'pvzFrom' : 'pvzTo');

                return pvzData;
            } catch (error) {
                console.error('Ошибка поиска ПВЗ:', error);
                alert(`Ошибка: ${error.message}`);
            }
        }

        // Обновление select с ПВЗ
        function updatePVZSelect(pvzData, selectId) {
            const select = getSdekElement(selectId);
            if (!select) return;

            const selectedValue = select.value;

            select.innerHTML = '<option value="">Выберите пункт выдачи</option>';

            pvzData.forEach(pvz => {
                if (pvz.code) {
                    const option = document.createElement('option');
                    option.value = pvz.code;
                    option.textContent = `${pvz.name} - ${pvz.location?.address || 'Адрес не указан'}`;
                    option.setAttribute('data-pvz-data', JSON.stringify(pvz));
                    option.setAttribute('name', 'pvzOption'); // добавляем атрибут name
                    select.appendChild(option);
                }
            });

            // Установка значения по умолчанию
            if (selectId === 'pvzFrom' && DEFAULT_PVZ.code) {
                const defaultOption = Array.from(select.options).find(opt => opt.value === DEFAULT_PVZ.code);
                if (defaultOption) {
                    select.value = DEFAULT_PVZ.code;
                }
            }

            if (selectedValue) {
                const optionToSelect = Array.from(select.options).find(opt => opt.value === selectedValue);
                if (optionToSelect) {
                    select.value = selectedValue;
                }
            }
        }

        // Функция для установки значений по умолчанию
        function setDefaultValues() {
            const cityFromInput = getSdekElement('cityFrom');
            const pvzFromSelect = getSdekElement('pvzFrom');

            // Устанавливаем город по умолчанию
            cityFromInput.value = DEFAULT_CITY;

            // Создаем option для пункта по умолчанию
            const defaultOption = document.createElement('option');
            defaultOption.value = DEFAULT_PVZ.code;
            defaultOption.textContent = DEFAULT_PVZ.name;
            defaultOption.setAttribute('data-pvz-data', JSON.stringify(DEFAULT_PVZ));
            defaultOption.selected = true;

            // Очищаем select и добавляем option по умолчанию
            pvzFromSelect.innerHTML = '';
            pvzFromSelect.appendChild(defaultOption);

            console.log('Установлены значения по умолчанию:', DEFAULT_CITY, DEFAULT_PVZ.name);
        }

        // Функция для расчета стоимости доставки
        async function calculateDelivery() {
            if (isCalculating) return;

            isCalculating = true;
            const loader = getSdekElement('loader');
            const results = getSdekElement('results');
            const pvzFromSelect = getSdekElement('pvzFrom');
            const pvzToSelect = getSdekElement('pvzTo');
            const cityFromInput = getSdekElement('cityFrom');
            const cityToInput = getSdekElement('cityTo');
            const tariff = getSdekElement('tariff').value;

            const pvzFromCode = pvzFromSelect.value;
            const pvzToCode = pvzToSelect.value;
            const cityFrom = cityFromInput.value;
            const cityTo = cityToInput.value;

            cartData = getCartData();

            if (!pvzFromCode || !pvzToCode || !cityFrom || !cityTo) {
                results.innerHTML = `
                    <div class="sdek-error">
                        <i class="fas fa-exclamation-circle"></i> Заполните все поля.
                    </div>
                `;
                isCalculating = false;
                return;
            }

            if (!cartData || !cartData.items || cartData.items.length === 0) {
                results.innerHTML = `
                    <div class="sdek-error">
                        <i class="fas fa-exclamation-circle"></i> Корзина пуста.
                    </div>
                `;
                isCalculating = false;
                return;
            }

            const calculateBtn = getSdekElement('calculate-btn');
            calculateBtn.style.pointerEvents = 'none';
            calculateBtn.style.opacity = '0.7';

            loader.classList.remove('sdek-hidden');

            // Показываем примерный расчет
            calculateDeliveryAlternative(cityFrom, cityTo, parseInt(tariff));

            try {
                // Пытаемся получить реальный расчет
                const pvzFromOption = pvzFromSelect.selectedOptions[0];
                const pvzToOption = pvzToSelect.selectedOptions[0];

                if (!pvzFromOption || !pvzToOption) return;

                const pvzFromData = JSON.parse(pvzFromOption.getAttribute('data-pvz-data'));
                const pvzToData = JSON.parse(pvzToOption.getAttribute('data-pvz-data'));

                if (!pvzFromData.code || !pvzToData.code) return;

                const totalWeight = cartData.items.reduce((sum, item) => sum + item.weight * item.quantity, 0);

                const requestData = {
                    "type": 1,
                    "currency": 1,
                    "tariff_code": parseInt(tariff),
                    "from_location": {
                        "code": parseInt(pvzFromData.code)
                    },
                    "to_location": {
                        "code": parseInt(pvzToData.code)
                    },
                    "packages": [
                        {
                            "weight": Math.max(100, totalWeight * 1000),
                            "length": 10,
                            "width": 10,
                            "height": 10
                        }
                    ]
                };

                const response = await fetch(CORS_PROXY + 'https://api.cdek.ru/v2/calculator/tariff', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const data = await response.json();
                    displayResults(data, pvzFromData, pvzToData, true);

                    // Сохраняем заявку
                    saveRequest({
                        fromCity: cityFrom,
                        toCity: cityTo,
                        price: data.delivery_sum,
                        tariff: parseInt(tariff),
                        weight: totalWeight,
                        isReal: true
                    });
                }

            } catch (error) {
                console.error('Ошибка API расчета:', error);
            } finally {
                loader.classList.add('sdek-hidden');
                calculateBtn.style.pointerEvents = 'auto';
                calculateBtn.style.opacity = '1';
                isCalculating = false;
            }
        }

        // Примерный расчет
        function calculateDeliveryAlternative(fromCity, toCity, tariffCode) {
            const pvzFromSelect = getSdekElement('pvzFrom');
            const pvzToSelect = getSdekElement('pvzTo');

            const pvzFromOption = pvzFromSelect.selectedOptions[0];
            const pvzToOption = pvzToSelect.selectedOptions[0];

            if (!pvzFromOption || !pvzToOption) return;

            const pvzFromData = JSON.parse(pvzFromOption.getAttribute('data-pvz-data'));
            const pvzToData = JSON.parse(pvzToOption.getAttribute('data-pvz-data'));

            const totalWeight = cartData.items.reduce((sum, item) => sum + item.weight * item.quantity, 0);
            const distance = getDistance(fromCity, toCity);
            const price = calculateApproximatePrice(tariffCode, totalWeight, distance);

            const minDays = Math.max(2, Math.ceil(distance / 500));
            const maxDays = Math.max(4, Math.ceil(distance / 300));

            const results = getSdekElement('results');
            results.innerHTML = `
                <div class="sdek-success">
                    <i class="fas fa-calculator"></i> Примерный расчет
                </div>
                <div class="sdek-route-info">
                    <div class="sdek-route-from">
                        <strong>Откуда:</strong><br>
                        ${pvzFromData.name}<br>
                        <small>${fromCity}</small>
                    </div>
                    <div class="sdek-route-arrow">→</div>
                    <div class="sdek-route-to">
                        <strong>Куда:</strong><br>
                        ${pvzToData.name}<br>
                        <small>${toCity}</small>
                    </div>
                </div>
                <div class="sdek-tariff-card">
                    <div class="sdek-tariff-header">
                        <span class="sdek-tariff-name">${getTariffName(tariffCode)}</span>
                        <span class="sdek-tariff-price" value="${price}" >${price} ₽</span>
                        <input type="hidden" class="sdek-tariff-price" value="${price}" name="delivery_price" id="delivery_price">
                    </div>
                    <div class="sdek-tariff-details">
                        <p><strong>Расстояние:</strong> ${distance} км</p>
                        <p><strong>Вес посылки:</strong> ${totalWeight} кг</p>
                        <p><strong>Срок доставки:</strong> ${minDays}-${maxDays} дней</p>
                        <p><strong>Тариф:</strong> ${getTariffName(tariffCode)}</p>
                        <p><strong>Статус:</strong> Примерный расчет</p>
                    </div>
                </div>
            `;

            // Сохраняем примерную заявку
            saveRequest({
                fromCity: fromCity,
                toCity: toCity,
                price: price,
                tariff: tariffCode,
                weight: totalWeight,
                isReal: false
            });
        }

        // Функция для отображения результатов
        function displayResults(data, pvzFrom, pvzTo, isReal = false) {
            const results = getSdekElement('results');
            document.getElementById('selected_pvz').value = pvzTo.name; // или pvzTo.code
            // Обновляем отображение результатов
            const html = `
                <div class="sdek-success">
                    <i class="fas fa-check-circle"></i> ${isReal ? 'Точный расчет от СДЭК' : 'Примерный расчет'}
                </div>
                <div class="sdek-route-info">
                    <div class="sdek-route-from">
                        <strong>Откуда:</strong><br>
                        ${pvzFrom.name}<br>
                        <small>${pvzFrom.location?.address || 'Адрес не указан'}</small>
                    </div>
                    <div class="sdek-route-arrow">→</div>
                    <div class="sdek-route-to">
                        <strong>Куда:</strong><br>
                        ${pvzTo.name}<br>
                        <small>${pvzTo.location?.address || 'Адрес не указан'}</small>
                    </div>
                </div>
                <div class="sdek-tariff-card">
                    <div class="sdek-tariff-header">
                        <span class="sdek-tariff-name">${getTariffName(data.tariff_code)}</span>
                        <span class="sdek-tariff-price">${data.delivery_sum} ₽</span>
                        <input type="hidden" class="sdek-tariff-price" value="${data.delivery_sum}" name="delivery_price" id="delivery_price">
                    </div>
                    <div class="sdek-tariff-details">
                        <p><strong>Срок доставки:</strong> ${data.period_min}-${data.period_max} дней</p>
                        <p><strong>Общая стоимость:</strong> ${data.total_sum} ₽</p>
                        ${data.insurance_sum ? `<p><strong>Страхование:</strong> ${data.insurance_sum} ₽</p>` : ''}
                        <p><strong>Статус:</strong> ${isReal ? 'Точный расчет от СДЭК' : 'Примерный расчет'}</p>
                    </div>
                </div>
            `;

            results.innerHTML = html;

            // Сохраняем выбранный ПВЗ и цену доставки в скрытые поля формы
            document.getElementById('selected_pvz').value = pvzTo.name; // или pvzTo.code, если нужно


            // Обновляем итоговую сумму
            const hiddenAmount = parseFloat(document.getElementById('amounthidden').value);
            const deliveryPrice = parseFloat(data.delivery_sum);
            const totalAmount = hiddenAmount + deliveryPrice;
            document.getElementById('all_amount').innerText = totalAmount + ' Руб.';
        }

        function getTariffName(code) {
            const tariffs = {
                136: "Посылка склад-склад", 137: "Посылка склад-дверь",
                138: "Посылка дверь-склад", 139: "Посылка дверь-дверь",
                233: "Экспресс-лайт склад-склад", 234: "Экспресс-лайт склад-дверь",
                231: "Экспресс-лайт дверь-склад", 232: "Экспресс-лайт дверь-дверь"
            };
            return tariffs[code] || `Тариф ${code}`;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            // Сначала устанавливаем значения по умолчанию
            setDefaultValues();

            // Затем загружаем данные корзины
            displayCartData();

            getSdekElement('cityFrom').addEventListener('change', function() {
                if (this.value) searchPVZ(this.value, true);
            });

            getSdekElement('cityTo').addEventListener('change', function() {
                if (this.value) searchPVZ(this.value, false);
            });

            getSdekElement('calculate-btn').addEventListener('click', function() {
                calculateDelivery();
            });

            // Показываем уведомление о значениях по умолчанию
            setTimeout(() => {
                const results = getSdekElement('results');
                results.innerHTML = `
                    <div class="sdek-success">
                        <i class="fas fa-info-circle"></i>
                        Установлены значения по умолчанию
                    </div>
                    <p>Город отправления: <strong>${DEFAULT_CITY}</strong></p>
                    <p>Пункт отправления: <strong>${DEFAULT_PVZ.name}</strong></p>
                    <p>Вы можете изменить эти значения или рассчитать стоимость</p>
                `;
            }, 1000);
        });
    })();

document.getElementById('sdek-pvzTo').addEventListener('change', function() {
    const selectedOption = this.options[this.selectedIndex];
    const pvzData = JSON.parse(selectedOption.getAttribute('data-pvz-data'));
    // Обновляем скрытое поле выбранного ПВЗ
    document.getElementById('selected_pvz').value = pvzData.name; // или pvzData.code
});
</script>
