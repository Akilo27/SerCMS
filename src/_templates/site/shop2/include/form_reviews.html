{% if user.is_authenticated %}
{% if show_reviews_form %}
<form id="review-form" class="review-form" method="post">
    {% csrf_token %}
    <input type="hidden" name="product" value="{{ product.id }}">
    {{ reviews_form.author }}
    <input type="hidden" name="author" value="{{ user.id }}">
    <div class="form-group">
        <label>Оценка</label>
        <div class="reviews-counter">
            <div class="rate">
                <input type="radio" id="star5" name="rate" value="5" />
                <label for="star5" title="text">5 stars</label>
                <input type="radio" id="star4" name="rate" value="4" />
                <label for="star4" title="text">4 stars</label>
                <input type="radio" id="star3" name="rate" value="3" />
                <label for="star3" title="text">3 stars</label>
                <input type="radio" id="star2" name="rate" value="2" />
                <label for="star2" title="text">2 stars</label>
                <input type="radio" id="star1" name="rate" value="1" />
                <label for="star1" title="text">1 star</label>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label>Отзыв</label>
        <textarea name="text" class="form-control" placeholder="Ваш отзыв"></textarea>
    </div>
    <input type="hidden" name="starvalue" id="reiting">
    <br>
    <button type="submit" class="btn btn-sm btn-primary pull-right">Оставить отзыв</button>
</form>
{% endif %}
{% endif %}
