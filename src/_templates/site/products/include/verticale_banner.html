{% load generals_tag %}
{% get_banner_vertical request.get_host as vertical_banners %}
<div class="section section-padding-02">
    <div class="container">
        <!-- Banner Wrapper Start -->
        <div class="banner-wrapper">
            <div class="row">
                {% for banner in vertical_banners %}
                <div class="col-lg-4 col-md-6 " {% if forloop.last%}id="lastbanner"{% endif%}>
                    <a href="{{ banner.slug }}">
                    <!-- Single Banner Start -->
                        <div class="single-banner">
                            <img src="{{ banner.image.url }}" width="370" height="245" alt="Banner" />
                            <div class="banner-content">
                                <div class="banner-content">
                                    <h3 class="title">
                                        {{banner.description|safe}}
                                    </h3>
                                    <span class="discount">{{banner.title|safe}}</span>
                                </div>
                            </div>
                            <!-- Single Banner End -->
                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
        <!-- Banner Wrapper End -->
    </div>
</div>

    <script>
        function updateClassesBanner() {
            const element = document.getElementById('lastbanner');
            if (window.innerWidth <= 1200) {
                element.classList.add('d-md-none');
            } else {
                element.classList.remove('d-md-none');
            }
        }
        // Вызываем функцию при загрузке страницы
        window.addEventListener('load', updateClassesBanner);

        // Вызываем функцию при изменении размера окна
        window.addEventListener('resize', updateClassesBanner);
    </script>
