{% load i18n %}
{% if notes %}
<div class="mt-3">
    <h6 class="fw-semibold mb-2">{% trans "Комментарии" %}:</h6>
    <div class="list-group">
        {% for note in notes %}
        <div class="list-group-item list-group-item-action mb-1 border rounded">
            <p class="mb-1">{{ note.content }}</p>
            <div class="d-flex justify-content-between">
                <small class="text-muted">Автор: {{ note.author.first_name }} {{ note.author.last_name }}</small>
                <small class="text-muted">{{ note.created_at|date:"d.m.Y H:i" }}</small>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% else %}
<p class="text-muted">{% trans "Нет комментариев" %}.</p>
{% endif %}
