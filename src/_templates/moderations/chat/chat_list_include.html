<div class="offcanvas-xxl offcanvas-start h-100" tabindex="-1" id="Contactoffcanvas" aria-labelledby="ContactoffcanvasLabel">
    <div class="card position-relative overflow-hidden">
        <div class="card-header border-0 d-flex justify-content-between align-items-center gap-3">
            <form class="chat-search pb-0">
                <div class="chat-search-box">
                    <input class="form-control" type="text" name="search" placeholder="{% trans 'Поиск' %} ...">
                    <button type="submit" class="btn btn-sm btn-link search-icon p-0 fs-15"><i class="ri-search-eye-line"></i></button>
                </div>
            </form>
        </div>
        <div class="px-2 mb-3 chat-setting-height" id="chat-list-json">


        </div>

    </div> <!-- end card -->
</div>
<script>
    const chatListLoader = {
        currentPage: 1,
        hasNext: true,
        isLoading: false,

        formatTime(date) {
            return new Intl.DateTimeFormat("en-US", {
                hour: "numeric",
                minute: "numeric",
                hour12: true,
            }).format(new Date(date));
        },

        createChatHTML(chat) {
            let readStatus = '';  // Для статуса прочтения
            let unreadBadge = '';  // Для бейджа с количеством непрочитанных сообщений

            if (chat.is_read) {
                if (chat.single_check) {
                    // Если только текущий пользователь в views, показываем одну галочку
                    readStatus = `<i class='ri-check-line fs-18 text-muted'></i>`;
                } else {
                    // Если сообщение прочитано, показываем две галочки
                    readStatus = `<i class='ri-check-double-line fs-18 text-primary'></i>`;
                }
            } else {
                // Если есть непрочитанные сообщения, показываем бейдж
                if (chat.unread_count > 0) {
                    unreadBadge = `<span class="badge bg-danger badge-pill">${chat.unread_count}</span>`;
                }
            }

            return `
        <div class="d-flex flex-column h-100 border-bottom">
            <a href="/chat/chats/${chat.id}/" class="d-block">
                <div class="d-flex align-items-center p-2 mb-1 rounded">
                    <div class="position-relative">
                        <img src="${chat.first_user.avatar || '/static/images/default-avatar.png'}"
                             alt="Avatar" class="avatar rounded-circle flex-shrink-0">
                    </div>
                    <div class="d-block ms-3 flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <h5 class="mb-0">${chat.first_user.username || 'Unknown'}</h5>
                            <div>
                                <p class="text-muted fs-13 mb-0">${chat.formatted_date}</p>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <p class="mb-0 text-muted d-flex align-items-center gap-1">${chat.last_message}</p>
                            ${readStatus}  <!-- Галочки для статуса прочтения -->
                            ${unreadBadge}  <!-- Количество непрочитанных сообщений -->
                        </div>
                    </div>
                </div>
            </a>
        </div>`;
        },

        loadChats() {
            if (!this.hasNext || this.isLoading) return;

            this.isLoading = true;
            const chatListContainer = document.getElementById('chat-list-json');

            fetch(`/chat/chat_list/json/?page=${this.currentPage}`)
                .then(response => {
                    if (!response.ok) {
                        console.error('Ошибка при запросе чатов:', response.status);
                        throw new Error('Ошибка при запросе чатов');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        data.chats.forEach(chat => {
                            chatListContainer.insertAdjacentHTML('beforeend', this.createChatHTML(chat));
                        });

                        this.hasNext = data.has_next;
                        this.currentPage++;
                    } else {
                        console.error('Ошибка загрузки чатов.');
                    }
                })
                .catch(error => {
                    console.error('Ошибка загрузки чатов:', error);
                })
                .finally(() => {
                    this.isLoading = false;
                });
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        const chatListContainer = document.getElementById('chat-list-json');

        // Первоначальная загрузка
        chatListLoader.loadChats();

        // Подгрузка при прокрутке внутри контейнера
        chatListContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = chatListContainer;

            // Проверяем, достиг ли пользователь нижней части контейнера
            if (scrollTop + clientHeight >= scrollHeight - 10) {
                chatListLoader.loadChats();
            }
        });
    });
</script>
